name: fitforge
description: "FitForge is a personalized fitness and nutrition companion built with Flutter."
publish_to: 'none'

version: 1.0.1+2

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  google_fonts: ^8.0.2
  fl_chart: ^1.2.0
  lottie: ^3.3.2
  smooth_page_indicator: ^2.0.1
  go_router: ^17.1.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  csv: ^6.0.0
  archive: ^4.0.7
  xml: ^6.5.0
  shared_preferences: ^2.5.3
  flutter_local_notifications: ^19.4.1
  timezone: ^0.10.1

  # Google Sign-In
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
    - assets/fonts/
    - assets/database/
